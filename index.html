<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioFlix Dublados</title>
    <style>
        :root { --main-red: #e50914; --dark-bg: #0a0a0a; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }

        header {
            padding: 15px 5%; background: #000; position: fixed; width: 100%; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between; box-sizing: border-box;
            border-bottom: 2px solid var(--main-red);
        }
        .logo { color: var(--main-red); font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav span { margin-left: 20px; cursor: pointer; color: #ccc; font-weight: bold; }
        .nav span:hover { color: white; }

        .container { padding: 90px 5% 40px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .card { cursor: pointer; position: relative; transition: 0.3s; }
        .card:hover { transform: scale(1.05); border: 1px solid var(--main-red); border-radius: 5px; }
        .card img { width: 100%; border-radius: 5px; }
        .badge { position: absolute; top: 5px; right: 5px; background: var(--main-red); font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; }

        /* PLAYER MODAL */
        #modal { position: fixed; inset: 0; background: #000; display: none; z-index: 2000; flex-direction: column; }
        .p-header { padding: 10px; background: #111; display: flex; justify-content: space-between; align-items: center; }
        iframe { width: 100%; flex-grow: 1; border: none; }
        .btn-close { background: var(--main-red); color: white; border: none; padding: 5px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        @media (max-width: 600px) { .movie-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; } }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">BIOFLIX</a>
    <div class="nav">
        <span onclick="mudar('movie')">FILMES</span>
        <span onclick="mudar('tv')">SÉRIES</span>
    </div>
</header>

<div class="container">
    <h2 id="grid-title">Carregando...</h2>
    <div class="movie-grid" id="grid"></div>
</div>

<div id="modal">
    <div class="p-header">
        <span style="color: #f1c40f; font-size: 0.8rem;">DICA: No player, procure por 'Dub' ou ícone de engrenagem.</span>
        <button class="btn-close" onclick="fechar()">FECHAR X</button>
    </div>
    <iframe id="player-frame" allowfullscreen allow="autoplay"></iframe>
</div>

<script>
    const API_KEY = '17df6160aca3d40e104b25638686a191';
    let tipoAtual = 'movie';

    async function carregar() {
        const res = await fetch(`https://api.themoviedb.org/3/trending/${tipoAtual}/week?api_key=${API_KEY}&language=pt-BR`);
        const data = await res.json();
        document.getElementById('grid-title').innerText = tipoAtual === 'movie' ? 'Filmes Populares' : 'Séries Populares';
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        data.results.forEach(m => {
            if(!m.poster_path) return;
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${m.poster_path}"><div class="badge">${tipoAtual.toUpperCase()} DUBLADO</div>`;
            div.onclick = () => abrir(m.id);
            grid.appendChild(div);
        });
    }

    function abrir(id) {
        const frame = document.getElementById('player-frame');
        // ESTE PLAYER É FOCADO EM CONTEÚDO PT-BR
        // Ele possui um seletor de temporadas automático para séries.
        const url = `https://superembed.org/embed?tmdb=${id}&type=${tipoAtual === 'tv' ? 'tv' : 'movie'}`;
        
        frame.src = url;
        document.getElementById('modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function fechar() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('player-frame').src = "";
        document.body.style.overflow = 'auto';
    }

    function mudar(t) { tipoAtual = t; carregar(); }
    carregar();
</script>

</body>
</html>
