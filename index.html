<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioFlix Pro - v9</title>
    <style>
        :root { --main-red: #e50914; --dark-bg: #060606; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; }

        header {
            padding: 15px 5%; background: #000; position: fixed; width: 100%; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between; box-sizing: border-box;
            border-bottom: 2px solid var(--main-red);
        }
        .logo { color: var(--main-red); font-size: 1.4rem; font-weight: bold; text-decoration: none; }
        
        .search-bar { background: #222; border-radius: 20px; padding: 5px 15px; display: flex; }
        .search-bar input { background: transparent; border: none; color: white; outline: none; width: 100px; }

        .nav-tabs { display: flex; gap: 15px; }
        .nav-tabs span { cursor: pointer; color: #ccc; font-weight: bold; font-size: 0.85rem; }

        .content { padding: 90px 5% 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .movie-card { cursor: pointer; position: relative; transition: 0.3s; border-radius: 8px; overflow: hidden; border: 1px solid #222; }
        .movie-card:hover { transform: scale(1.05); border-color: var(--main-red); }
        .movie-card img { width: 100%; display: block; }

        /* PLAYER MULTIPLAYER */
        #modal-player { position: fixed; inset: 0; background: #000; display: none; z-index: 2000; flex-direction: column; }
        .p-controls { padding: 10px; background: #111; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .srv-btns { display: flex; gap: 5px; }
        .srv-btns button { background: #333; color: white; border: none; padding: 7px 12px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .srv-btns button.active { background: var(--main-red); }
        
        .video-box { flex-grow: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-x { background: white; color: black; border: none; padding: 5px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 10px; } }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="location.reload()">BIOFLIX</a>
    <div class="search-bar"><input type="text" id="q" placeholder="Buscar..." onkeyup="doSearch(this.value)"></div>
    <div class="nav-tabs">
        <span onclick="setType('movie')">FILMES</span>
        <span onclick="setType('tv')">SÉRIES</span>
    </div>
</header>

<div class="content">
    <h2 id="g-title">Destaques</h2>
    <div class="grid" id="main-grid"></div>
</div>

<div id="modal-player">
    <div class="p-controls">
        <div class="srv-btns">
            <button id="b1" onclick="changeSrv(1)">OPÇÃO 1 (Principal)</button>
            <button id="b2" onclick="changeSrv(2)">OPÇÃO 2 (Backup)</button>
            <button id="b3" onclick="changeSrv(3)">OPÇÃO 3 (Nativo)</button>
        </div>
        <button class="close-x" onclick="closePlayer()">FECHAR</button>
    </div>
    <div class="video-box">
        <iframe id="ifr" allowfullscreen allow="autoplay"></iframe>
    </div>
</div>

<script>
    const API_KEY = '17df6160aca3d40e104b25638686a191';
    let currentT = 'movie';
    let currentMId = '';

    async function loadData() {
        const r = await fetch(`https://api.themoviedb.org/3/trending/${currentT}/week?api_key=${API_KEY}&language=pt-BR`);
        const d = await r.json();
        document.getElementById('g-title').innerText = currentT === 'movie' ? 'Filmes Populares' : 'Séries Populares';
        render(d.results);
    }

    async function doSearch(val) {
        if(val.length < 3) { if(val.length === 0) loadData(); return; }
        const r = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(val)}&language=pt-BR`);
        const d = await r.json();
        render(d.results);
    }

    function render(list) {
        const g = document.getElementById('main-grid');
        g.innerHTML = "";
        list.forEach(m => {
            if(!m.poster_path) return;
            const t = m.media_type || currentT;
            const d = document.createElement('div');
            d.className = 'movie-card';
            d.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${m.poster_path}">`;
            d.onclick = () => openPlayer(m.id, t);
            g.appendChild(d);
        });
    }

    function openPlayer(id, type) {
        currentMId = id;
        currentT = type;
        document.getElementById('modal-player').style.display = 'flex';
        changeSrv(1);
        document.body.style.overflow = 'hidden';
    }

    function changeSrv(n) {
        const f = document.getElementById('ifr');
        document.querySelectorAll('.srv-btns button').forEach((b, i) => b.classList.toggle('active', i === n-1));

        // URLs de agregadores que funcionam melhor em 2026 para BR
        const sources = {
            1: `https://autoembed.to/tv/tmdb/${currentMId}?server=1`, 
            2: `https://multiembed.mov/directstream.php?video_id=${currentMId}&tmdb=1`,
            3: `https://vidsrc.me/embed/${currentT === 'tv' ? 'tv' : 'movie'}?tmdb=${currentMId}`
        };

        // Ajuste específico para Filmes na Opção 1
        if(currentT === 'movie' && n === 1) sources[1] = `https://autoembed.to/movie/tmdb/${currentMId}?server=1`;

        f.src = sources[n];
    }

    function closePlayer() {
        document.getElementById('modal-player').style.display = 'none';
        document.getElementById('ifr').src = "";
        document.body.style.overflow = 'auto';
    }

    function setType(t) { currentT = t; loadData(); }
    loadData();
</script>

</body>
</html>
